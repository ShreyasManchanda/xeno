services:
  postgres:
    image: postgres:15-alpine
    container_name: xenion_postgres
    environment:
      POSTGRES_USER: xenion
      POSTGRES_PASSWORD: xenion_dev
      POSTGRES_DB: xenion_crm
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xenion -d xenion_crm"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres_test:
    image: postgres:15-alpine
    container_name: xenion_postgres_test
    environment:
      POSTGRES_USER: xenion
      POSTGRES_PASSWORD: xenion_test
      POSTGRES_DB: xenion_crm_test
    ports:
      - "5435:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xenion -d xenion_crm_test"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  postgres_test_data:
